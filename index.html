<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingua — Translation Tool</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-background-tertiary: #f0f0f0;
  --color-background-info: #e8f0fe;
  --color-border-primary: #aaaaaa;
  --color-border-secondary: #dddddd;
  --color-border-tertiary: #eeeeee;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #555555;
  --color-text-tertiary: #999999;
  --color-text-info: #1a73e8;
  --color-text-danger: #c62828;
  --border-radius-md: 6px;
  --border-radius-lg: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--color-background-tertiary); min-height: 100vh; padding: 2rem 1rem; }
.app { max-width: 720px; margin: 0 auto; }
.header { margin-bottom: 2rem; }
.header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }

/* API key collapsible */
details.card summary {
  font-size: 13px; color: var(--color-text-secondary); cursor: pointer;
  user-select: none; list-style: none; display: flex; align-items: center; gap: 6px;
}
details.card summary::-webkit-details-marker { display: none; }
details.card summary::before { content: '⚙'; font-size: 14px; }
.apikey-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.apikey-row label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
.apikey-row input { flex: 1; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-family: monospace; }
.apikey-hint { font-size: 12px; color: var(--color-text-tertiary); margin-top: 6px; }

/* Mode toggle */
.mode-toggle { display: flex; margin-bottom: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; width: fit-content; }
.mode-btn { padding: 7px 20px; font-size: 13px; font-weight: 500; border: none; background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; }
.mode-btn.active { background: var(--color-text-primary); color: #fff; }
.mode-btn:not(.active):hover { background: var(--color-background-secondary); }

textarea { width: 100%; min-height: 100px; padding: 10px 12px; font-size: 15px; font-family: var(--font-sans); resize: vertical; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); line-height: 1.5; }
textarea:focus { outline: none; border-color: var(--color-border-primary); }
textarea::placeholder { color: var(--color-text-tertiary); }

.controls { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; margin-top: 10px; }
.lang-group { display: flex; flex-direction: column; gap: 6px; }
.lang-select { padding: 8px 12px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); min-width: 160px; cursor: pointer; }
input[type=text] { padding: 8px 12px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); min-width: 160px; }
input[type=text]::placeholder { color: var(--color-text-tertiary); }

.run-btn { padding: 8px 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; min-height: 44px; align-self: flex-start; }
.run-btn:hover { background: var(--color-background-secondary); }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.shortcut-hint { font-size: 12px; color: var(--color-text-tertiary); margin-top: 6px; }

.validation-hint { font-size: 13px; color: var(--color-text-danger); margin-top: 6px; display: none; }
.validation-hint.visible { display: block; }
.result-card { display: none; }
.result-card.visible { display: block; }
.section { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
.section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-tertiary); margin-bottom: 8px; }
.translation-row { display: flex; gap: 12px; }
.translation-col { flex: 1; min-width: 0; }
.translation-col-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-tertiary); margin-bottom: 6px; }
.translation-header { display: flex; align-items: flex-start; gap: 8px; }
.translation-text { font-size: 18px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; flex: 1; }
.copy-btn { padding: 4px 9px; font-size: 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 32px; }
.copy-btn:hover { background: var(--color-background-secondary); }
.meta-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.badge { font-size: 12px; padding: 3px 10px; border-radius: 99px; }
.badge-lang { background: var(--color-background-info); color: var(--color-text-info); }
.badge-tone { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.body-text { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
.alt-item { font-size: 14px; color: var(--color-text-primary); padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.alt-item:last-child { border-bottom: none; }
.loading { display: none; align-items: center; gap: 8px; color: var(--color-text-tertiary); font-size: 14px; padding: 1rem 0; }
.loading.visible { display: flex; }
.spinner { width: 16px; height: 16px; border: 1.5px solid var(--color-border-tertiary); border-top-color: var(--color-text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { font-size: 14px; color: var(--color-text-danger); padding: 8px 0; display: none; }
.error.visible { display: block; }
.etym-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; }
.etym-btn:hover:not(:disabled) { background: var(--color-background-tertiary); }
.etym-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.etym-result { margin-top: 12px; display: none; }
.etym-result.visible { display: block; }

/* explain-only hidden by default */
#sectionDefinition { display: none; }

@media (max-width: 540px) {
  .translation-row { flex-direction: column; gap: 16px; }
  .shortcut-hint { display: none; }
  .controls { flex-direction: column; align-items: stretch; }
  .lang-group { width: 100%; }
  .lang-select, input[type=text] { width: 100%; max-width: 100%; min-width: 0; }
  .run-btn { width: 100%; min-height: 52px; font-size: 16px; text-align: center; align-self: stretch; }
  textarea { min-height: 130px; font-size: 16px; }
  .mode-toggle { width: 100%; }
  .mode-btn { flex: 1; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Lingua</h1>
    <p>Translate or explain text with meaning and word origins</p>
  </div>

  <details id="apiKeyDetails" class="card">
    <summary>API Settings</summary>
    <form onsubmit="return false" autocomplete="off">
      <div class="apikey-row">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="new-password" aria-label="Anthropic API key" />
      </div>
    </form>
    <p class="apikey-hint">Stored in localStorage — sent only to the Anthropic API.</p>
  </details>

  <div class="card">
    <div class="mode-toggle" role="group" aria-label="Action mode">
      <button class="mode-btn active" id="modeBtnTranslate" data-mode="translate">Translate</button>
      <button class="mode-btn" id="modeBtnExplain" data-mode="explain">Explain</button>
    </div>

    <textarea id="inputText" placeholder="Enter text to translate..." aria-label="Text to translate"></textarea>
    <div class="validation-hint" id="validationHint" role="alert"></div>

    <div class="controls">
      <div class="lang-group" id="langGroup">
        <select id="targetLangSelect" class="lang-select" aria-label="Target language">
          <option value="Romanian">Romanian</option>
          <option value="Russian">Russian</option>
          <option value="English">English</option>
          <option value="other">Other...</option>
        </select>
        <input type="text" id="targetLangCustom" placeholder="Enter language..." aria-label="Custom target language" style="display:none;" />
      </div>
      <button class="run-btn" id="runBtn" aria-label="Translate text">Translate</button>
    </div>
    <p class="shortcut-hint" id="shortcutHint">Tip: Ctrl+Enter to translate</p>
  </div>

  <div class="loading" id="loading" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <span id="loadingText">Translating...</span>
  </div>
  <div class="error" id="error" role="alert"></div>

  <div class="card result-card" id="resultCard" aria-live="polite">

    <div class="section" id="sectionTranslation">
      <div class="section-label">Translation</div>
      <div class="translation-row">
        <div class="translation-col">
          <div class="translation-col-label">Informal</div>
          <div class="translation-header">
            <div class="translation-text" id="translationInformal"></div>
            <button class="copy-btn" data-copy="translationInformal" aria-label="Copy informal translation">Copy</button>
          </div>
        </div>
        <div class="translation-col">
          <div class="translation-col-label">Formal</div>
          <div class="translation-header">
            <div class="translation-text" id="translationFormal"></div>
            <button class="copy-btn" data-copy="translationFormal" aria-label="Copy formal translation">Copy</button>
          </div>
        </div>
      </div>
      <div class="meta-row">
        <span class="badge badge-lang" id="sourceLang"></span>
        <span class="badge badge-tone" id="tone"></span>
      </div>
    </div>

    <div class="section" id="sectionDefinition">
      <div class="section-label">Definition</div>
      <div class="body-text" id="definition"></div>
      <div class="meta-row">
        <span class="badge badge-lang" id="explainLang"></span>
        <span class="badge badge-tone" id="explainRegister"></span>
      </div>
    </div>

    <div class="section">
      <div class="section-label" id="alternativesLabel">Alternatives</div>
      <div id="alternatives"></div>
    </div>

    <div class="section">
      <div class="section-label">Meaning &amp; context</div>
      <div class="body-text" id="meaning"></div>
    </div>

    <div class="section">
      <button class="etym-btn" id="etymBtn" aria-expanded="false">Word origin &amp; etymology</button>
      <div class="etym-result body-text" id="etymology" role="region" aria-label="Word origin and etymology"></div>
    </div>

  </div>
</div>

<script>
(function () {
  var mode = 'translate';
  var lastText = '';
  var lastLang = '';
  var etymCached = false;

  var savedKey = localStorage.getItem('lingua_api_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
  } else {
    document.getElementById('apiKeyDetails').open = true;
  }

  document.getElementById('apiKey').addEventListener('change', function () {
    localStorage.setItem('lingua_api_key', this.value.trim());
  });

  // Mode toggle
  document.querySelectorAll('.mode-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      mode = this.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      applyMode();
    });
  });

  function applyMode() {
    var isTranslate = mode === 'translate';
    document.getElementById('langGroup').style.display = isTranslate ? '' : 'none';
    document.getElementById('runBtn').textContent = isTranslate ? 'Translate' : 'Explain';
    document.getElementById('runBtn').setAttribute('aria-label', isTranslate ? 'Translate text' : 'Explain word or phrase');
    document.getElementById('inputText').placeholder = isTranslate
      ? 'Enter text to translate...'
      : 'Enter a word or phrase to explain...';
    document.getElementById('shortcutHint').textContent = isTranslate
      ? 'Tip: Ctrl+Enter to translate'
      : 'Tip: Ctrl+Enter to explain';
  }

  // Language selector: show custom input when "Other" is chosen
  document.getElementById('targetLangSelect').addEventListener('change', function () {
    var custom = document.getElementById('targetLangCustom');
    if (this.value === 'other') {
      custom.style.display = '';
      custom.focus();
    } else {
      custom.style.display = 'none';
    }
  });

  document.getElementById('runBtn').addEventListener('click', runAction);
  document.getElementById('etymBtn').addEventListener('click', fetchEtymology);
  document.getElementById('inputText').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.ctrlKey) runAction();
  });

  document.querySelectorAll('.copy-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var text = document.getElementById(this.dataset.copy).textContent;
      navigator.clipboard.writeText(text).then(function () {
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = 'Copy'; }, 1500);
      });
    });
  });

  function getTargetLang() {
    var sel = document.getElementById('targetLangSelect');
    return sel.value === 'other'
      ? document.getElementById('targetLangCustom').value.trim()
      : sel.value;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function runAction() {
    if (mode === 'translate') runTranslate(); else runExplain();
  }

  async function runTranslate() {
    var text = document.getElementById('inputText').value.trim();
    var lang = getTargetLang();
    var apiKey = document.getElementById('apiKey').value.trim();

    if (!apiKey) { showHint('Please enter your Anthropic API key in API Settings above.'); return; }
    if (!text)   { showHint('Please enter text to translate.'); return; }
    if (!lang)   { showHint('Please enter a target language.'); return; }
    clearHint();
    setLoading(true, 'Translating...');
    lastText = text; lastLang = lang; etymCached = false;
    resetEtym();

    var systemPrompt = [
      'You are a professional linguist and translator.',
      'Translate the user\'s text to ' + lang + ' in both informal and formal registers.',
      'Respond ONLY with a valid JSON object — no markdown, no extra text:',
      '{',
      '  "translation_informal": "informal translation",',
      '  "translation_formal": "formal translation",',
      '  "source_language": "detected language name",',
      '  "tone": "tone of source (casual, formal, sarcastic, etc)",',
      '  "alternatives": ["alt1", "alt2", "alt3"],',
      '  "meaning": "explanation of meaning, idioms, cultural context"',
      '}'
    ].join('\n');

    try {
      var result = await callApi(apiKey, systemPrompt, text, 2000);
      document.getElementById('sectionTranslation').style.display = '';
      document.getElementById('sectionDefinition').style.display = 'none';
      document.getElementById('alternativesLabel').textContent = 'Alternatives';

      document.getElementById('translationInformal').textContent = result.translation_informal;
      document.getElementById('translationFormal').textContent = result.translation_formal;
      document.getElementById('sourceLang').textContent = result.source_language;
      document.getElementById('tone').textContent = result.tone;
      document.getElementById('alternatives').innerHTML = (result.alternatives || [])
        .map(function (a) { return '<div class="alt-item">' + escapeHtml(a) + '</div>'; }).join('');
      document.getElementById('meaning').textContent = result.meaning;

      document.getElementById('resultCard').classList.add('visible');
    } catch (err) {
      showError(err);
    } finally {
      setLoading(false);
    }
  }

  async function runExplain() {
    var text = document.getElementById('inputText').value.trim();
    var apiKey = document.getElementById('apiKey').value.trim();

    if (!apiKey) { showHint('Please enter your Anthropic API key in API Settings above.'); return; }
    if (!text)   { showHint('Please enter a word or phrase to explain.'); return; }
    clearHint();
    setLoading(true, 'Explaining...');
    lastText = text; lastLang = ''; etymCached = false;
    resetEtym();

    var systemPrompt = [
      'You are a professional linguist.',
      'Explain the meaning of the user\'s word or phrase clearly.',
      'Respond ONLY with a valid JSON object — no markdown, no extra text:',
      '{',
      '  "language": "detected language name",',
      '  "definition": "clear, detailed definition of the word or phrase",',
      '  "register": "formal / informal / slang / neutral / technical / etc",',
      '  "synonyms": ["syn1", "syn2", "syn3"],',
      '  "meaning": "nuances, cultural context, usage notes, idiom origin if applicable"',
      '}'
    ].join('\n');

    try {
      var result = await callApi(apiKey, systemPrompt, text, 1500);
      document.getElementById('sectionTranslation').style.display = 'none';
      document.getElementById('sectionDefinition').style.display = '';
      document.getElementById('alternativesLabel').textContent = 'Synonyms';

      document.getElementById('definition').textContent = result.definition;
      document.getElementById('explainLang').textContent = result.language;
      document.getElementById('explainRegister').textContent = result.register;
      document.getElementById('alternatives').innerHTML = (result.synonyms || [])
        .map(function (s) { return '<div class="alt-item">' + escapeHtml(s) + '</div>'; }).join('');
      document.getElementById('meaning').textContent = result.meaning;

      document.getElementById('resultCard').classList.add('visible');
    } catch (err) {
      showError(err);
    } finally {
      setLoading(false);
    }
  }

  async function callApi(apiKey, systemPrompt, userText, maxTokens) {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: maxTokens || 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userText }]
      })
    });

    if (!response.ok) {
      var errData = await response.json().catch(function () { return {}; });
      var msg = (errData.error && errData.error.message) ? errData.error.message : 'HTTP ' + response.status;
      throw new Error('api:' + msg);
    }

    var data = await response.json();
    var raw = data.content[0].text.replace(/```json|```/g, '').trim();
    return JSON.parse(raw);
  }

  function showHint(msg) {
    var hint = document.getElementById('validationHint');
    hint.textContent = msg;
    hint.classList.add('visible');
  }
  function clearHint() {
    document.getElementById('validationHint').classList.remove('visible');
  }

  function showError(err) {
    var errEl = document.getElementById('error');
    if (err.message && err.message.startsWith('api:')) {
      errEl.textContent = 'API error: ' + err.message.slice(4);
    } else if (err instanceof SyntaxError) {
      errEl.textContent = 'Could not parse the response. Please try again.';
    } else {
      errEl.textContent = 'Network error — check your connection and try again.';
    }
    errEl.classList.add('visible');
  }

  function setLoading(on, text) {
    var btn = document.getElementById('runBtn');
    var loading = document.getElementById('loading');
    if (on) {
      btn.disabled = true;
      document.getElementById('loadingText').textContent = text || 'Loading...';
      loading.classList.add('visible');
      document.getElementById('error').classList.remove('visible');
      document.getElementById('resultCard').classList.remove('visible');
    } else {
      btn.disabled = false;
      loading.classList.remove('visible');
    }
  }

  function resetEtym() {
    var etymEl = document.getElementById('etymology');
    etymEl.textContent = '';
    etymEl.classList.remove('visible');
    var etymBtn = document.getElementById('etymBtn');
    etymBtn.textContent = 'Word origin & etymology';
    etymBtn.setAttribute('aria-expanded', 'false');
    etymCached = false;
  }

  async function fetchEtymology() {
    var etymEl = document.getElementById('etymology');
    var etymBtn = document.getElementById('etymBtn');

    if (etymCached) {
      var expanded = etymEl.classList.toggle('visible');
      etymBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      return;
    }

    var apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey || !lastText) return;

    etymBtn.disabled = true;
    etymBtn.textContent = 'Loading...';

    try {
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 600,
          system: 'You are a linguist. Explain the word origin and etymology of the key words or phrases in the user\'s text. If it is an idiom or culturally specific expression, explain its history and why those words are used. If it is plain language, note that briefly. Write 2–5 sentences of plain prose — no JSON, no bullet points.',
          messages: [{ role: 'user', content: lastText + (lastLang ? ' (translated to ' + lastLang + ')' : '') }]
        })
      });

      if (!response.ok) {
        var errData = await response.json().catch(function () { return {}; });
        throw new Error((errData.error && errData.error.message) ? errData.error.message : 'HTTP ' + response.status);
      }

      var data = await response.json();
      etymEl.textContent = data.content[0].text.trim();
      etymEl.classList.add('visible');
      etymBtn.setAttribute('aria-expanded', 'true');
      etymCached = true;
    } catch (err) {
      etymEl.textContent = 'Could not load etymology: ' + err.message;
      etymEl.classList.add('visible');
    } finally {
      etymBtn.disabled = false;
      etymBtn.textContent = 'Word origin & etymology';
    }
  }
})();
</script>
</body>
</html>
